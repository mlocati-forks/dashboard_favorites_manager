name: Tests

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - main

jobs:

  php-syntax:
    name: PHP ${{ matrix.php-version }} Syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - "7.3"
          - "8.5"
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: opcache
          coverage: none
          tools: none
      -
        name: Check syntax
        uses: mlocati/check-php-syntax@v1
        with:
          fail-on-warnings: true

  php-cs:
    name: PHP Coding Style
    runs-on: ubuntu-latest
    container: ghcr.io/concrete5-community/docker5:9.5
    steps:
      -
        name: Start DBMS
        run: ccm-service start db
      -
        name: Install PHP CS Fixer
        run: ccm-install php-cs-fixer
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Move repository
        run: mv "$GITHUB_WORKSPACE" /app/packages/dashboard_favorites_manager
      -
        name: Check code style
        working-directory: /app
        run: ./concrete/bin/concrete c5:phpcs --ansi --no-interaction --no-cache check /app/packages/dashboard_favorites_manager

  development-leftovers:
    name: Check Development Leftovers
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Search for debugger or xdebug_break
        run: |
          echo "Scanning for 'debugger' or 'xdebug_break'..."
          matches=$(grep -Enr --include=\*.{js,php} '(^|[^a-zA-Z0-9_])(debugger|xdebug_break)\b' . || true)
          if [[ -n "$matches" ]]; then
            echo "Found the following matches:"
            echo "$matches"
            echo "::error::Development leftovers found in the codebase."
            exit 1
          else
            echo "No development leftovers found."
          fi

  install:
    name: Install on Concrete ${{ matrix.ccm-version }}
    runs-on: ubuntu-latest
    container: ghcr.io/concrete5-community/docker5:${{ matrix.ccm-version }}
    needs:
      - php-syntax
      - php-cs
      - development-leftovers
    strategy:
      matrix:
        ccm-version:
          - "9.2"
          - "9.3"
          - "9.4"
          - latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Check composer.json
        run: sudo -u www-data composer --ansi --no-interaction validate --strict -- "$GITHUB_WORKSPACE/composer.json"
      -
        name: Start services
        run: ccm-service start db
      -
        name: Core info
        run: sudo -u www-data /app/concrete/bin/concrete5 --ansi --no-interaction c5:info
      -
        name: Prepare package
        run: ln -s "$GITHUB_WORKSPACE" /app/packages/dashboard_favorites_manager
      -
        name: Install package
        run: sudo -u www-data /app/concrete/bin/concrete5 --ansi --no-interaction c5:package:install dashboard_favorites_manager
